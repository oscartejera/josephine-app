name: CI — Contract Safety

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  safety-checks:
    name: Type Check + Contract Tests + Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Gate 1: TypeScript must compile clean ──
      - name: 🔒 TypeScript — zero errors
        run: npx tsc --noEmit

      # ── Gate 2: Contract tests validate RPC shapes ──
      - name: 🧪 Contract Tests — RPC schemas match frontend
        run: npx vitest run src/data/__tests__/rpc-contracts.test.ts

      # ── Gate 3: Migration lint catches destructive SQL (new files only) ──
      - name: 🛡️ Migration Lint — no orphan DROPs
        run: |
          # Only lint migrations created after the baseline (2026-03-04)
          for f in supabase/migrations/20260304*.sql supabase/migrations/20260305*.sql supabase/migrations/2026031*.sql supabase/migrations/2026032*.sql supabase/migrations/2026030[5-9]*.sql; do
            [ -f "$f" ] && node scripts/validate-migration.mjs "$f"
          done
          echo "✅ New migration lint complete"
