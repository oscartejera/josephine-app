name: Deploy Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  deploy-migrations:
    name: Push Pending Migrations
    runs-on: ubuntu-latest
    # Run after CI passes (migration lint is in ci.yml Gate 3)
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: qixipveebfhurbarksib
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $PROJECT_REF

      - name: Push migrations to remote
        run: |
          # Try normal push first; if it fails due to out-of-order migrations,
          # repair the history and retry with --include-all
          if ! supabase db push 2>&1; then
            echo "⚠️  Normal push failed — attempting repair + --include-all"
            # Mark any out-of-order migrations as applied (reverted first)
            for f in supabase/migrations/*.sql; do
              ts=$(basename "$f" | cut -d_ -f1)
              supabase migration repair --status reverted "$ts" 2>/dev/null || true
            done
            supabase db push --include-all
          fi

      - name: Regenerate TypeScript types
        run: |
          supabase gen types typescript --project-id $PROJECT_REF > src/integrations/supabase/types.ts
          echo "✅ Types regenerated (not committed — use db:types locally)"
