# ──────────────────────────────────────────────────────────
# Codemagic CI/CD – Josephine Native iOS (SwiftUI + XcodeGen)
# ──────────────────────────────────────────────────────────
# Two workflows:
#   1. native-ios-verify  → Quick build WITHOUT signing (verify compilation)
#   2. native-ios-release → Full build WITH signing → TestFlight
#
# Triggers: push to main branch, or manual run from Codemagic dashboard.
# ──────────────────────────────────────────────────────────

workflows:

  # ═══════════════════════════════════════════════
  # Native iOS (SwiftUI) — Verify Build
  # ═══════════════════════════════════════════════
  # Pure Swift/SwiftUI project at native-ios/JosephineTeam/
  # Uses XcodeGen + SPM — BUILD-ONLY verification, no signing
  native-ios-verify:
    name: Josephine Native iOS Verify (XcodeGen + SwiftUI)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: false    # Manual trigger only — flip to true when ready
      cancel_previous_builds: true

    scripts:
      # ── 1. Install XcodeGen ──
      - name: Install XcodeGen
        script: |
          brew install xcodegen
          xcodegen --version

      # ── 2. Generate Xcode project from project.yml ──
      - name: Generate Xcode project
        script: |
          cd native-ios/JosephineTeam
          xcodegen generate
          echo ""
          echo ">>> Generated .xcodeproj contents:"
          ls -la JosephineTeam.xcodeproj/

      # ── 3. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd native-ios/JosephineTeam
          xcodebuild -resolvePackageDependencies \
            -project JosephineTeam.xcodeproj \
            -scheme "JosephineTeam"

      # ── 4. Build without signing (verify compilation) ──
      - name: Build iOS (no signing)
        script: |
          cd native-ios/JosephineTeam
          xcodebuild \
            -project "JosephineTeam.xcodeproj" \
            -scheme "JosephineTeam" \
            -configuration "Release" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════════════════════
  # NATIVE iOS — SIGNED RELEASE → TestFlight
  # ═══════════════════════════════════════════════════════════════
  # Manual signing: fetch-signing-files --create handles new App IDs
  # that don't have profiles yet (declarative ios_signing fails for those)
  native-ios-release:
    name: Native iOS — Release → TestFlight
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      groups:
        - app_store_credentials
      vars:
        XCODE_SCHEME: JosephineTeam
        BUNDLE_ID: com.josephine.team-staff

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: release/native-ios/*
          include: true
          source: true
      tag_patterns:
        - pattern: native-ios/v*
          include: true

    scripts:
      # ── 1. Install XcodeGen ──
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      # ── 2. Generate Xcode Project ──
      - name: Generate Xcode project
        script: |
          cd native-ios/JosephineTeam
          xcodegen generate

      # ── 2b. Diagnostic: verify generated project ──
      - name: Verify generated Info.plist and build settings
        script: |
          cd native-ios/JosephineTeam
          echo "═══════════════════════════════════"
          echo ">>> Generated JosephineTeam-Info.plist:"
          echo "═══════════════════════════════════"
          cat JosephineTeam-Info.plist || echo "❌ JosephineTeam-Info.plist NOT FOUND"
          echo ""
          echo "═══════════════════════════════════"
          echo ">>> CFBundleIconName in plist:"
          echo "═══════════════════════════════════"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" JosephineTeam-Info.plist 2>&1 || echo "❌ CFBundleIconName NOT in plist"
          echo ""
          echo "═══════════════════════════════════"
          echo ">>> Relevant build settings:"
          echo "═══════════════════════════════════"
          xcodebuild -project JosephineTeam.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -showBuildSettings 2>/dev/null | grep -E "(INFOPLIST|ASSETCATALOG|GENERATE_INFO|PRODUCT_BUNDLE)" || true
          echo ""
          echo "═══════════════════════════════════"
          echo ">>> Asset catalog files on disk:"
          echo "═══════════════════════════════════"
          find Resources/Assets.xcassets -type f | sort
          echo ""
          echo ">>> Contents.json for AppIcon:"
          cat Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

      # ── 3. Resolve SPM dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd native-ios/JosephineTeam
          xcodebuild -resolvePackageDependencies \
            -project JosephineTeam.xcodeproj \
            -scheme "$XCODE_SCHEME"


      # ── 5. Initialize keychain ──
      - name: Initialize keychain
        script: |
          keychain initialize

      # ── 6. Fetch or CREATE signing files ──
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose

      # ── 7. Install certs into keychain ──
      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      # ── 8. Archive + Export IPA with manual signing overrides ──
      # XcodeGen projects don't work with `xcode-project use-profiles`.
      # We extract profile details and pass them directly to xcodebuild.
      - name: Archive and export IPA
        script: |
          set -euo pipefail

          # ── Find the provisioning profile installed by Codemagic ──
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles \
                              ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles \
                              -name "*.mobileprovision" -print -quit 2>/dev/null || true)

          if [ -z "$PROFILE_PATH" ]; then
            echo "❌ No provisioning profile found!"
            find ~/Library -name "*.mobileprovision" 2>/dev/null || echo "None anywhere"
            exit 1
          fi
          echo "✅ Found profile: $PROFILE_PATH"

          # ── Extract profile metadata ──
          PLIST=$(/usr/bin/security cms -D -i "$PROFILE_PATH")
          PROFILE_NAME=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          PROFILE_UUID=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          TEAM_ID=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin)

          echo "═══════════════════════════════════"
          echo "PROFILE_NAME: $PROFILE_NAME"
          echo "PROFILE_UUID: $PROFILE_UUID"
          echo "TEAM_ID:      $TEAM_ID"
          echo "BUNDLE_ID:    $BUNDLE_ID"
          echo "═══════════════════════════════════"

          # ── Copy profile to where Xcode expects it ──
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision 2>/dev/null || true

          # ── List signing identities ──
          echo ""
          echo ">>> Available signing identities:"
          security find-identity -v -p codesigning

          # ── Overwrite Signing.xcconfig for CI (scoped to app target only) ──
          # This does NOT affect SPM dependency targets like swift-crypto.
          printf '%s\n' \
            "CODE_SIGN_STYLE = Manual" \
            "DEVELOPMENT_TEAM = ${TEAM_ID}" \
            "CODE_SIGN_IDENTITY = iPhone Distribution" \
            "PROVISIONING_PROFILE_SPECIFIER = ${PROFILE_NAME}" \
            "PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID}" \
            > native-ios/JosephineTeam/Signing.xcconfig
          echo ">>> Signing.xcconfig overwritten for CI:"
          cat native-ios/JosephineTeam/Signing.xcconfig

          # ── Strip Associated Domains from entitlements ──
          # The auto-created provisioning profile does not include this capability.
          # Enable it manually in Apple Developer Portal, then remove this block.
          ENTITLEMENTS="native-ios/JosephineTeam/Resources/JosephineTeam.entitlements"
          /usr/libexec/PlistBuddy -c "Delete :com.apple.developer.associated-domains" "$ENTITLEMENTS" 2>/dev/null || true
          echo ">>> Entitlements after stripping Associated Domains:"
          cat "$ENTITLEMENTS"

          # ── Increment build number (inline – no cross-step deps) ──
          echo ""
          echo "═══════════════════════════════════"
          echo ">>> Build Number Increment"
          echo "═══════════════════════════════════"

          # Try to get the latest build number from TestFlight
          echo ">>> Running: app-store-connect get-latest-testflight-build-number $BUNDLE_ID"
          LATEST_BUILD_RAW=$(app-store-connect get-latest-testflight-build-number \
            "$BUNDLE_ID" 2>&1) || true
          echo ">>> Raw output: [$LATEST_BUILD_RAW]"

          # Extract only the numeric part (last line that looks like a number)
          LATEST_BUILD=$(echo "$LATEST_BUILD_RAW" | grep -Eo '^[0-9]+$' | tail -1 || true)
          echo ">>> Extracted build number: [$LATEST_BUILD]"

          # Default to 1 if empty (meaning TestFlight has at least build 1 already)
          if [ -z "$LATEST_BUILD" ] || [ "$LATEST_BUILD" -eq 0 ]; then
            echo ">>> WARNING: Could not get build number from TestFlight, defaulting to 1"
            LATEST_BUILD=1
          fi

          NEW_BUILD=$((LATEST_BUILD + 1))
          echo ">>> Previous build: $LATEST_BUILD → New build: $NEW_BUILD"

          # METHOD 1: Patch the generated Info.plist directly
          PLIST_PATH="native-ios/JosephineTeam/JosephineTeam-Info.plist"
          if [ -f "$PLIST_PATH" ]; then
            plutil -replace CFBundleVersion -string "$NEW_BUILD" "$PLIST_PATH"
            echo "✅ Patched $PLIST_PATH → CFBundleVersion = $NEW_BUILD"
            /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST_PATH"
          else
            echo "⚠️ Plist not found at $PLIST_PATH (XcodeGen may use build settings instead)"
          fi

          # METHOD 2: Also update the xcconfig and build settings
          echo "CURRENT_PROJECT_VERSION = $NEW_BUILD" >> native-ios/JosephineTeam/Signing.xcconfig
          echo "✅ Appended CURRENT_PROJECT_VERSION=$NEW_BUILD to Signing.xcconfig"
          echo ">>> Final Signing.xcconfig:"
          cat native-ios/JosephineTeam/Signing.xcconfig

          # ── Force CFBundleIconName into generated plist ──
          PLIST_PATH="native-ios/JosephineTeam/JosephineTeam-Info.plist"
          if [ -f "$PLIST_PATH" ]; then
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" "$PLIST_PATH" 2>/dev/null \
              || /usr/libexec/PlistBuddy -c "Set :CFBundleIconName AppIcon" "$PLIST_PATH"
            echo "✅ Ensured CFBundleIconName=AppIcon in $PLIST_PATH"
          fi

          # ── Verify asset catalog contents ──
          echo ""
          echo ">>> Asset catalog verification:"
          ls -la native-ios/JosephineTeam/Resources/Assets.xcassets/AppIcon.appiconset/
          cat native-ios/JosephineTeam/Resources/Assets.xcassets/AppIcon.appiconset/Contents.json

          # ── Archive (signing comes from xcconfig, build number from override) ──
          cd native-ios/JosephineTeam
          echo ""
          echo ">>> Archiving with CURRENT_PROJECT_VERSION=$NEW_BUILD"
          xcodebuild archive \
            -project "JosephineTeam.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration "Release" \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/JosephineTeam.xcarchive" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CURRENT_PROJECT_VERSION="$NEW_BUILD" \
            INFOPLIST_KEY_CFBundleVersion="$NEW_BUILD" \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS=YES
          cd ../..

          # ── Diagnostic: verify build number in final bundle ──
          APP="$CM_BUILD_DIR/JosephineTeam.xcarchive/Products/Applications/JosephineTeam.app"
          echo ""
          echo "═══════════════════════════════════"
          echo ">>> Post-Archive Verification"
          echo "═══════════════════════════════════"
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP/Info.plist" 2>&1 || echo "UNKNOWN")
          echo ">>> CFBundleVersion in final bundle: [$BUNDLE_VERSION]"
          if [ "$BUNDLE_VERSION" = "1" ] || [ "$BUNDLE_VERSION" = "UNKNOWN" ]; then
            echo "❌ ERROR: Build number was NOT incremented! Bundle still has version $BUNDLE_VERSION"
            echo ">>> Attempting emergency plist patch on bundle..."
            plutil -replace CFBundleVersion -string "$NEW_BUILD" "$APP/Info.plist"
            echo ">>> After emergency patch:"
            /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP/Info.plist"
          else
            echo "✅ Build number correctly set to $BUNDLE_VERSION"
          fi
          echo ""
          echo ">>> Assets.car exists?"
          ls -la "$APP/Assets.car" 2>&1 || echo "❌ Assets.car NOT FOUND"
          echo ""
          echo ">>> CFBundleIconName in bundle:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP/Info.plist" 2>&1 || echo "❌ NOT FOUND"



          # ── Export IPA ──
          cat > "$CM_BUILD_DIR/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/JosephineTeam.xcarchive" \
            -exportPath "$CM_BUILD_DIR/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/ExportOptions.plist"

          echo "✅ IPA exported to $CM_BUILD_DIR/ipa/"
          ls -la "$CM_BUILD_DIR/ipa/"

    artifacts:
      - "**/*.ipa"
      - "$CM_BUILD_DIR/JosephineTeam.xcarchive/**/*.dSYM"
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true
