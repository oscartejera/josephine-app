# ──────────────────────────────────────────────────────────
# Codemagic CI/CD – Josephine iOS + iPad Universal Build
# ──────────────────────────────────────────────────────────
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
#
# Two workflows:
#   1. ios-verify  → Quick build WITHOUT signing (free, no Apple account needed)
#   2. ios-release → Full build WITH signing + TestFlight (requires Apple Dev Account)
#
# Triggers: push to main branch, or manual run from Codemagic dashboard.
# ──────────────────────────────────────────────────────────

workflows:

  # ═══════════════════════════════════════════════
  # WORKFLOW 1: Verify build (NO signing required)
  # ═══════════════════════════════════════════════
  # Use this now — verifies npm + Capacitor + Xcode compile without Apple account
  ios-verify:
    name: Josephine iOS Verify (No Signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22

      vars:
        BUNDLE_ID: app.josephine.dashboard
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: false
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: |
          npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: |
          npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios


      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Build without signing (verify compilation) ──
      - name: Build iOS (no signing)
        script: |
          xcodebuild \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════
  # WORKFLOW 2: Full release → TestFlight
  # ═══════════════════════════════════════════════
  ios-release:
    name: Josephine iOS Release → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.josephine.team
      vars:
        BUNDLE_ID: com.josephine.team
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Auto-increment build number ──
      - name: Set build version
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      # ── 6. Build signed IPA ──
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        submit_to_testflight: true
