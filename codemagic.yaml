# ──────────────────────────────────────────────────────────
# Codemagic CI/CD – Josephine iOS + iPad Universal Build
# ──────────────────────────────────────────────────────────
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
#
# Two workflows:
#   1. ios-verify  → Quick build WITHOUT signing (free, no Apple account needed)
#   2. ios-release → Full build WITH signing + TestFlight (requires Apple Dev Account)
#
# Triggers: push to main branch, or manual run from Codemagic dashboard.
# ──────────────────────────────────────────────────────────

workflows:

  # ═══════════════════════════════════════════════
  # WORKFLOW 1: Verify build (NO signing required)
  # ═══════════════════════════════════════════════
  # Use this now — verifies npm + Capacitor + Xcode compile without Apple account
  ios-verify:
    name: Josephine iOS Verify (No Signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22

      vars:
        BUNDLE_ID: app.josephine.dashboard
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: false
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: |
          npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: |
          npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios


      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Build without signing (verify compilation) ──
      - name: Build iOS (no signing)
        script: |
          xcodebuild \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════
  # WORKFLOW 2: Full release → TestFlight
  # ═══════════════════════════════════════════════
  ios-release:
    name: Josephine iOS Release → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.josephine.team
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Initialize keychain for code signing ──
      - name: Set up keychain
        script: keychain initialize

      # ── 6. Fetch or CREATE signing files (cert + profile) ──
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      # ── 7. Install certs into keychain ──
      - name: Add certificates to keychain
        script: keychain add-certificates

      # ── 8. Get signing info & configure project ──
      - name: Prepare signing
        script: |
          # Find the provisioning profile UUID
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -print -quit)
          PROFILE_UUID=$(basename "$PROFILE_PATH" .mobileprovision)
          
          # Extract profile name using security cms
          PLIST=$(/usr/bin/security cms -D -i "$PROFILE_PATH")
          PROFILE_NAME=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          TEAM_ID_FROM_PROFILE=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin)
          
          echo "PROFILE_UUID=$PROFILE_UUID"
          echo "PROFILE_NAME=$PROFILE_NAME"
          echo "TEAM_ID=$TEAM_ID_FROM_PROFILE"
          
          # Export for subsequent steps
          echo "PROFILE_UUID=$PROFILE_UUID" >> $CM_ENV
          echo "PROFILE_NAME=$PROFILE_NAME" >> $CM_ENV
          echo "SIGNING_TEAM_ID=$TEAM_ID_FROM_PROFILE" >> $CM_ENV

      # ── 9. Auto-increment build number ──
      - name: Set build version
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      # ── 10. Archive with explicit signing ──
      - name: Build iOS archive
        script: |
          xcodebuild archive \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -archivePath "build/ios/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$SIGNING_TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO

      # ── 11. Export IPA ──
      - name: Export IPA
        script: |
          cat > build/ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${SIGNING_TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath "build/ios/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist "build/ios/ExportOptions.plist"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/App.xcarchive

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
