# ──────────────────────────────────────────────────────────
# Codemagic CI/CD – Josephine iOS + iPad Universal Build
# ──────────────────────────────────────────────────────────
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
#
# Two workflows:
#   1. ios-verify  → Quick build WITHOUT signing (free, no Apple account needed)
#   2. ios-release → Full build WITH signing + TestFlight (requires Apple Dev Account)
#
# Triggers: push to main branch, or manual run from Codemagic dashboard.
# ──────────────────────────────────────────────────────────

workflows:

  # ═══════════════════════════════════════════════
  # WORKFLOW 1: Verify build (NO signing required)
  # ═══════════════════════════════════════════════
  # Use this now — verifies npm + Capacitor + Xcode compile without Apple account
  ios-verify:
    name: Josephine iOS Verify (No Signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22

      vars:
        BUNDLE_ID: app.josephine.dashboard
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: false
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: |
          npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: |
          npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios


      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Build without signing (verify compilation) ──
      - name: Build iOS (no signing)
        script: |
          xcodebuild \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════
  # WORKFLOW 2: Full release → TestFlight
  # ═══════════════════════════════════════════════
  ios-release:
    name: Josephine iOS Release → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.josephine.team
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      # ── 4. Patch Info.plist (export compliance + metadata) ──
      - name: Patch Info.plist
        script: |
          PLIST="ios/App/App/Info.plist"
          
          # Export compliance — app does NOT use non-exempt encryption
          # (only HTTPS via WKWebView, which is exempt)
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          
          echo "✅ Info.plist patched: ITSAppUsesNonExemptEncryption = false"

      # ── 5. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 6. Initialize keychain for code signing ──
      - name: Set up keychain
        script: keychain initialize

      # ── 7. Fetch or CREATE signing files (cert + profile) ──
      - name: Fetch signing files
        script: |
          set -e
          echo ">>> Fetching signing files for bundle ID: $BUNDLE_ID"
          
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose
          
          echo ""
          echo ">>> Profiles saved by Codemagic:"
          find ~/Library/Developer/Xcode/UserData -name "*.mobileprovision" 2>/dev/null || echo "None!"
          echo ""
          echo ">>> Certificates saved by Codemagic:"
          find ~/Library/Developer/Xcode/UserData -name "*.p12" 2>/dev/null || echo "None!"

      # ── 8. Install certs into keychain ──
      - name: Add certificates to keychain
        script: |
          keychain add-certificates
          echo ""
          echo ">>> Signing identities:"
          security find-identity -v -p codesigning
          echo ""
          echo ">>> Provisioning profiles:"
          find ~/Library/Developer/Xcode/UserData -name "*.mobileprovision" 2>/dev/null || echo "EMPTY!"

      # ── 9. Patch project, archive, and export IPA (single script) ──
      - name: Build and sign IPA
        script: |
          set -euo pipefail
          
          # ── Find provisioning profile ──
          # Codemagic CLI saves to ~/Library/Developer/Xcode/UserData/Provisioning Profiles/
          PROFILE_PATH=$(find ~/Library/Developer/Xcode/UserData -name "*.mobileprovision" -print -quit 2>/dev/null)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found!"
            echo "Searched: ~/Library/Developer/Xcode/UserData/"
            find ~/Library -name "*.mobileprovision" 2>/dev/null || echo "None anywhere in ~/Library"
            exit 1
          fi
          echo ">>> Found profile: $PROFILE_PATH"
          
          PROFILE_UUID=$(basename "$PROFILE_PATH" .mobileprovision)
          
          # Extract profile details
          PLIST=$(/usr/bin/security cms -D -i "$PROFILE_PATH")
          PROFILE_NAME=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          TEAM_ID=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin)
          
          echo "========================================="
          echo "PROFILE_UUID: $PROFILE_UUID"
          echo "PROFILE_NAME: $PROFILE_NAME"
          echo "TEAM_ID:      $TEAM_ID"
          echo "BUNDLE_ID:    $BUNDLE_ID"
          echo "========================================="
          
          # ── Patch the Xcode project with Ruby ──
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          
          echo "Before patching - signing settings:"
          grep -n "ProvisioningStyle\|CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE" "$PBXPROJ" || true
          
          ruby <<RUBY
          content = File.read("$PBXPROJ")
          
          # 1. Change ProvisioningStyle = Automatic → Manual in TargetAttributes
          content.gsub!(/ProvisioningStyle\s*=\s*Automatic/, 'ProvisioningStyle = Manual')
          
          # 2. If no ProvisioningStyle exists, add before the closing of TargetAttributes blocks
          # (Capacitor projects always have this, so #1 should catch it)
          
          # 3. Replace or add DEVELOPMENT_TEAM in build settings
          if content.include?('DEVELOPMENT_TEAM')
            content.gsub!(/DEVELOPMENT_TEAM\s*=\s*"[^"]*"/, 'DEVELOPMENT_TEAM = "$TEAM_ID"')
            content.gsub!(/DEVELOPMENT_TEAM\s*=\s*[^";]*;/, 'DEVELOPMENT_TEAM = "$TEAM_ID";')
          end
                    # 4. Replace CODE_SIGN_STYLE if exists
           content.gsub!(/CODE_SIGN_STYLE\s*=\s*Automatic/, 'CODE_SIGN_STYLE = Manual')
           
           # 5. Add DEVELOPMENT_TEAM to DevelopmentTeam in TargetAttributes if present
           content.gsub!(/DevelopmentTeam\s*=\s*"[^"]*"/, 'DevelopmentTeam = "$TEAM_ID"')
           content.gsub!(/DevelopmentTeam\s*=\s*[^";]*;/, 'DevelopmentTeam = "$TEAM_ID";')
           
           # 6. Replace PRODUCT_BUNDLE_IDENTIFIER to match provisioning profile
           content.gsub!(/PRODUCT_BUNDLE_IDENTIFIER\s*=\s*"[^"]*"/, 'PRODUCT_BUNDLE_IDENTIFIER = "$BUNDLE_ID"')
           content.gsub!(/PRODUCT_BUNDLE_IDENTIFIER\s*=\s*[^";]*;/, 'PRODUCT_BUNDLE_IDENTIFIER = "$BUNDLE_ID";')
          
          File.write("$PBXPROJ", content)
          puts "✅ pbxproj patched successfully"
          RUBY
          
          echo ""
          echo "After patching - signing settings:"
          grep -n "ProvisioningStyle\|CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE\|PRODUCT_BUNDLE_IDENTIFIER" "$PBXPROJ" || true
          echo ""
          
          # ── Auto-increment build number ──
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST + 1))
          cd ../..
          
          # ── Archive ──
          xcodebuild archive \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -archivePath "build/ios/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO
          
          # ── Export IPA ──
          cat > build/ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath "build/ios/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist "build/ios/ExportOptions.plist"
          
          # ── Upload to App Store Connect ──
          echo ""
          echo "=== Uploading IPA to App Store Connect ==="
          
          # Write the API key to the expected location for xcrun
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8
          
          xcrun altool --upload-app \
            --type ios \
            --file "build/ios/ipa/App.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true
