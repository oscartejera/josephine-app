# ──────────────────────────────────────────────────────────
# Codemagic CI/CD – Josephine iOS + iPad Universal Build
# ──────────────────────────────────────────────────────────
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
#
# Two workflows:
#   1. ios-verify  → Quick build WITHOUT signing (free, no Apple account needed)
#   2. ios-release → Full build WITH signing + TestFlight (requires Apple Dev Account)
#
# Triggers: push to main branch, or manual run from Codemagic dashboard.
# ──────────────────────────────────────────────────────────

workflows:

  # ═══════════════════════════════════════════════
  # WORKFLOW 1: Verify build (NO signing required)
  # ═══════════════════════════════════════════════
  # Use this now — verifies npm + Capacitor + Xcode compile without Apple account
  ios-verify:
    name: Josephine iOS Verify (No Signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22

      vars:
        BUNDLE_ID: app.josephine.dashboard
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: false
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: |
          npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: |
          npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios


      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Build without signing (verify compilation) ──
      - name: Build iOS (no signing)
        script: |
          xcodebuild \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════
  # WORKFLOW 2: Full release → TestFlight
  # ═══════════════════════════════════════════════
  ios-release:
    name: Josephine iOS Release → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.josephine.team
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Initialize keychain for code signing ──
      - name: Set up keychain
        script: keychain initialize

      # ── 6. Fetch or CREATE signing files (cert + profile) ──
      - name: Fetch signing files
        script: |
          set -e
          echo "=== DEBUG: Environment Variables ==="
          echo ">>> Bundle ID: $BUNDLE_ID"
          echo ">>> Key ID: $APP_STORE_CONNECT_KEY_IDENTIFIER"
          echo ">>> Issuer ID: $APP_STORE_CONNECT_ISSUER_ID"
          echo ">>> ASC Private key (.p8) length: $(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | wc -c) chars"
          echo ">>> ASC Private key first line: $(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | head -1)"
          echo ">>> ASC Private key last line: $(echo "$APP_STORE_CONNECT_PRIVATE_KEY" | tail -1)"
          echo ""
          echo "=== DEBUG: CERTIFICATE_PRIVATE_KEY ==="
          echo ">>> Cert key length: $(echo "$CERTIFICATE_PRIVATE_KEY" | wc -c) chars"
          echo ">>> Cert key line count: $(echo "$CERTIFICATE_PRIVATE_KEY" | wc -l) lines"
          echo ">>> Cert key first line: $(echo "$CERTIFICATE_PRIVATE_KEY" | head -1)"
          echo ">>> Cert key last line: $(echo "$CERTIFICATE_PRIVATE_KEY" | tail -1)"
          echo ""
          
          echo "=== Fetching signing files ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose
          
          echo ""
          echo "=== POST-FETCH: Searching for ALL .mobileprovision files ==="
          find / -name "*.mobileprovision" 2>/dev/null || echo "None found anywhere!"
          echo ""
          echo "=== POST-FETCH: Provisioning Profiles dir ==="
          ls -laR ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "Directory empty or missing!"
          echo ""
          echo "=== POST-FETCH: Certificate files ==="
          find / -name "*.p12" 2>/dev/null || echo "No .p12 files found!"
          echo ""
          echo "=== POST-FETCH: Codemagic signing dir ==="
          ls -laR ~/Library/MobileDevice/ 2>/dev/null || echo "No MobileDevice dir!"

      # ── 7. Install certs into keychain ──
      - name: Add certificates to keychain
        script: |
          echo "=== Adding certificates to keychain ==="
          keychain add-certificates || echo "WARNING: keychain add-certificates had errors (continuing anyway)"
          echo ""
          echo "=== Signing identities ==="
          security find-identity -v -p codesigning || echo "No signing identities"
          echo ""
          echo "=== Provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "EMPTY!"
          echo ""
          echo "=== All .mobileprovision files ==="
          find ~/Library -name "*.mobileprovision" 2>/dev/null || echo "None found!"

      # ── 8. Patch project, archive, and export IPA (single script) ──
      - name: Build and sign IPA
        script: |
          set -euo pipefail
          
          # ── Find provisioning profile ──
          PROFILE_PATH=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -print -quit)
          if [ -z "$PROFILE_PATH" ]; then
            echo "ERROR: No provisioning profile found!"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
            exit 1
          fi
          
          PROFILE_UUID=$(basename "$PROFILE_PATH" .mobileprovision)
          
          # Extract profile details
          PLIST=$(/usr/bin/security cms -D -i "$PROFILE_PATH")
          PROFILE_NAME=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          TEAM_ID=$(echo "$PLIST" | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin)
          
          echo "========================================="
          echo "PROFILE_UUID: $PROFILE_UUID"
          echo "PROFILE_NAME: $PROFILE_NAME"
          echo "TEAM_ID:      $TEAM_ID"
          echo "BUNDLE_ID:    $BUNDLE_ID"
          echo "========================================="
          
          # ── Patch the Xcode project with Ruby ──
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          
          echo "Before patching - signing settings:"
          grep -n "ProvisioningStyle\|CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE" "$PBXPROJ" || true
          
          ruby <<RUBY
          content = File.read("$PBXPROJ")
          
          # 1. Change ProvisioningStyle = Automatic → Manual in TargetAttributes
          content.gsub!(/ProvisioningStyle\s*=\s*Automatic/, 'ProvisioningStyle = Manual')
          
          # 2. If no ProvisioningStyle exists, add before the closing of TargetAttributes blocks
          # (Capacitor projects always have this, so #1 should catch it)
          
          # 3. Replace or add DEVELOPMENT_TEAM in build settings
          if content.include?('DEVELOPMENT_TEAM')
            content.gsub!(/DEVELOPMENT_TEAM\s*=\s*"[^"]*"/, 'DEVELOPMENT_TEAM = "$TEAM_ID"')
            content.gsub!(/DEVELOPMENT_TEAM\s*=\s*[^";]*;/, 'DEVELOPMENT_TEAM = "$TEAM_ID";')
          end
          
          # 4. Replace CODE_SIGN_STYLE if exists
          content.gsub!(/CODE_SIGN_STYLE\s*=\s*Automatic/, 'CODE_SIGN_STYLE = Manual')
          
          # 5. Add DEVELOPMENT_TEAM to DevelopmentTeam in TargetAttributes if present
          content.gsub!(/DevelopmentTeam\s*=\s*"[^"]*"/, 'DevelopmentTeam = "$TEAM_ID"')
          content.gsub!(/DevelopmentTeam\s*=\s*[^";]*;/, 'DevelopmentTeam = "$TEAM_ID";')
          
          File.write("$PBXPROJ", content)
          puts "✅ pbxproj patched successfully"
          RUBY
          
          echo ""
          echo "After patching - signing settings:"
          grep -n "ProvisioningStyle\|CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE" "$PBXPROJ" || true
          echo ""
          
          # ── Auto-increment build number ──
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST + 1))
          cd ../..
          
          # ── Archive ──
          xcodebuild archive \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -archivePath "build/ios/App.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            COMPILER_INDEX_STORE_ENABLE=NO
          
          # ── Export IPA ──
          cat > build/ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${BUNDLE_ID}</key>
                  <string>${PROFILE_NAME}</string>
              </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath "build/ios/App.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist "build/ios/ExportOptions.plist"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
