# ──────────────────────────────────────────────────────────
# Codemagic CI/CD – Josephine iOS + iPad Universal Build
# ──────────────────────────────────────────────────────────
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-capacitor-app/
#
# Two workflows:
#   1. ios-verify  → Quick build WITHOUT signing (free, no Apple account needed)
#   2. ios-release → Full build WITH signing + TestFlight (requires Apple Dev Account)
#
# Triggers: push to main branch, or manual run from Codemagic dashboard.
# ──────────────────────────────────────────────────────────

workflows:

  # ═══════════════════════════════════════════════
  # WORKFLOW 1: Verify build (NO signing required)
  # ═══════════════════════════════════════════════
  # Use this now — verifies npm + Capacitor + Xcode compile without Apple account
  ios-verify:
    name: Josephine iOS Verify (No Signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22

      vars:
        BUNDLE_ID: app.josephine.dashboard
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: false
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: |
          npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: |
          npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios


      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Build without signing (verify compilation) ──
      - name: Build iOS (no signing)
        script: |
          xcodebuild \
            -project "ios/App/App.xcodeproj" \
            -scheme "App" \
            -configuration "Release" \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            | xcpretty

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════
  # WORKFLOW 2: Full release → TestFlight
  # ═══════════════════════════════════════════════
  ios-release:
    name: Josephine iOS Release → TestFlight
    max_build_duration: 45
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      node: 22
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: com.josephine.team
        APP_NAME: Josephine

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true

    scripts:
      # ── 1. Install Node dependencies ──
      - name: Install dependencies
        script: npm ci

      # ── 2. Build web app → dist/ ──
      - name: Build web app
        script: npm run build

      # ── 3. Add & Sync iOS platform ──
      - name: Sync iOS platform
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      # ── 4. Resolve Swift Package Manager dependencies ──
      - name: Resolve SPM dependencies
        script: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme "App"

      # ── 5. Initialize keychain for code signing ──
      - name: Set up keychain
        script: keychain initialize

      # ── 6. Fetch or CREATE signing files (cert + profile) ──
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      # ── 7. Install certs into keychain ──
      - name: Add certificates to keychain
        script: keychain add-certificates

      # ── 8. Force manual signing in Xcode project ──
      - name: Configure manual signing
        script: |
          # Get the provisioning profile name
          PROFILE_NAME=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -exec \
            /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin \; 2>/dev/null | head -1)
          
          PROFILE_UUID=$(find ~/Library/MobileDevice/Provisioning\ Profiles -name "*.mobileprovision" -print -quit | \
            xargs basename | sed 's/.mobileprovision//')
          
          echo "Profile Name: $PROFILE_NAME"
          echo "Profile UUID: $PROFILE_UUID"
          
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          
          # Force manual code signing
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ"
          
          # Set CODE_SIGN_STYLE to Manual
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"

      # ── 9. Apply provisioning profiles to Xcode project ──
      - name: Use provisioning profiles
        script: xcode-project use-profiles --project "ios/App/App.xcodeproj"

      # ── 10. Auto-increment build number ──
      - name: Set build version
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST + 1))

      # ── 11. Build signed IPA ──
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - oscar.tejera99@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
