name: JosephineTeam
options:
  bundleIdPrefix: com.josephine
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"



targets:
  JosephineTeam:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.josephine.team-staff
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "Josephine Team"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Necesitamos tu ubicación para verificar el fichaje en tu restaurante"
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "Necesitamos tu ubicación para verificar el fichaje en tu restaurante"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_FILE: Resources/Info.plist
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Resources/JosephineTeam.entitlements
      properties:
        com.apple.developer.associated-domains:
          - "applinks:josephine.app"
        aps-environment: development
