name: JosephineTeam
options:
  bundleIdPrefix: com.josephine
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"



targets:
  JosephineTeam:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
    resources:
      - path: Resources
        excludes:
          - "Info.plist"
          - "Assets.xcassets"
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig

    # ─── Info.plist (generated by XcodeGen) ───
    info:
      path: JosephineTeam-Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleDisplayName: "Josephine Team"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: BackgroundColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "Necesitamos tu ubicación para verificar los fichajes geográficamente."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIUserInterfaceStyle: Dark

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.josephine.team-staff
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
        INFOPLIST_KEY_CFBundleIconName: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: Resources/JosephineTeam.entitlements
      properties:
        com.apple.developer.associated-domains:
          - "applinks:josephine.app"
        aps-environment: development
